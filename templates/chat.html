<!DOCTYPE html>
<html>
<head>
    <title>Chat Room</title>
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

    <style>
        body { font-family: Arial; background: #ece5dd; }

        .chat {
            width: 400px;
            margin: auto;
            background: white;
            height: 600px;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #075e54;
            color: white;
            padding: 10px;
        }

        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: scroll;
        }

        .msg {
            margin: 5px;
            padding: 8px;
            border-radius: 10px;
            max-width: 70%;
        }

        .me { background: #dcf8c6; align-self: flex-end; }
        .other { background: #fff; }

        .input { display: flex; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>

<body>

<div class="chat">
    <div class="header">
        Room: {{ room }} | User: {{ name }}
    </div>

    <div id="chatBox" class="messages"></div>

    <div class="input">
        <input id="message" placeholder="Type message">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
var socket = io();

let name = "{{ name }}";
let room = "{{ room }}";
let algo = "{{ algo }}";
let key = "{{ key }}";

socket.emit("join", {name: name, room: room});

function sendMessage() {
    let msg = document.getElementById("message").value;

    socket.emit("send_message", {
        name: name,
        room: room,
        message: msg,
        algo: algo,
        key: key,
        receiver_algo: algo,
        receiver_key: key
    });
}

socket.on("receive_message", function(data) {
    let div = document.createElement("div");
    div.classList.add("msg");

    if (data.name === name) {
        div.classList.add("me");
    } else {
        div.classList.add("other");
    }

    let text = data.decrypted
        ? "🔓 " + data.decrypted
        : "🔒 " + data.cipher;

    div.innerHTML = `<b>${data.name}:</b> ${text}`;
    document.getElementById("chatBox").appendChild(div);
});
</script>

</body>
</html>
