<!DOCTYPE html>
<html>
<head>
    <title>Secure Chat</title>
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
</head>
<body>

<h1>🔐 Smart Secure Chat</h1>

<h3>Your Settings</h3>
<select id="myAlgo">
    <option value="AES">AES</option>
    <option value="Caesar">Caesar</option>
    <option value="Affine">Affine</option>
    <option value="RailFence">Rail Fence</option>
    <option value="RowTransposition">Row Transposition</option>
    <option value="Playfair">Playfair</option>
</select><br><br>

<input id="myKey" placeholder="Your key"><br><br>

<hr>

<h3>Send Message</h3>
<input id="message" placeholder="Type message"><br><br>

<h4>Sender Settings</h4>

<select id="senderAlgo">
    <option value="AES">AES</option>
    <option value="Caesar">Caesar</option>
    <option value="Affine">Affine</option>
    <option value="RailFence">Rail Fence</option>
    <option value="RowTransposition">Row Transposition</option>
    <option value="Playfair">Playfair</option>
</select><br><br>

<input id="senderKey" placeholder="Sender key"><br><br>

<button onclick="sendMessage()">Send</button>

<hr>

<h3>Chat</h3>
<div id="chatBox"></div>

<script>
    var socket = io();

    function sendMessage() {
        socket.emit("send_message", {
            message: document.getElementById("message").value,
            sender_algo: document.getElementById("senderAlgo").value,
            sender_key: document.getElementById("senderKey").value,
            receiver_algo: document.getElementById("myAlgo").value,
            receiver_key: document.getElementById("myKey").value
        });
    }

    socket.on("receive_message", function(data) {
        let text = data.decrypted
            ? "🔓 Plain: " + data.decrypted
            : "🔒 Cipher: " + data.cipher;

        document.getElementById("chatBox").innerHTML += `<p>${text}</p>`;
    });
</script>

</body>
</html>
