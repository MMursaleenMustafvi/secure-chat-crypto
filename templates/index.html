<!DOCTYPE html>
<html>
<head>
    <title>Secure Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>🔐 Secure Chat System</h2>

<form method="POST">
    <input type="text" name="message" placeholder="Enter message" required><br><br>

    <select name="algorithm">
        <option value="AES">AES</option>
        <option value="Caesar">Caesar</option>
        <option value="Affine">Affine</option>
    </select><br><br>

    <input type="text" name="key" placeholder="Key (e.g. 3 or 5,8)" required><br><br>

    <button type="submit">Encrypt & Decrypt</button>
</form>

<hr>

<h3>🔒 Cipher:</h3>
<p>{{ cipher }}</p>

<h3>🔓 Decrypted:</h3>
<p>{{ result }}</p>

</body>
</html>
