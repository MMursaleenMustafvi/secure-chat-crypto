<!DOCTYPE html>
<html>
<head>
    <title>Secure Chat Crypto</title>
</head>
<body>

<h1>🔐 Secure Crypto System</h1>

<form method="POST">

    <input type="text" name="message" placeholder="Enter message" required><br><br>

    <select name="algorithm" required>
        <option value="AES">AES</option>
        <option value="Caesar">Caesar</option>
        <option value="Affine">Affine</option>
        <option value="RailFence">Rail Fence</option>
        <option value="RowTransposition">Row Transposition</option>
        <option value="Playfair">Playfair</option>
    </select><br><br>

    <input type="text" name="key" placeholder="Key (e.g. 3 or 5,8)" required><br><br>

    <button type="submit">Encrypt & Decrypt</button>

</form>

<hr>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<h3>🔒 Cipher:</h3>
<p>{{ cipher }}</p>

<h3>🔓 Decrypted:</h3>
<p>{{ result }}</p>

<hr>

<a href="/chat">👉 Go to Live Chat</a>

</body>
</html>
